openapi: 3.0.3
info:
  title: Neptun API
  version: 1.0.0
  description: OpenAPI spec for the new (Angular) version of Neptun. [Cors Everywhere](https://addons.mozilla.org/en-US/firefox/addon/cors-everywhere/) extension is recommended for testing the API.
components:
  schemas:
    Notification:
      type: object
      properties:
        type:
          type: integer
          description: Notification type (0=Warning, 1=Information, 3=HandledError)
        title:
          type: [string, 'null']
          nullable: true
        description:
          type: string
    NotificationArray:
      type: array
      items:
        $ref: '#/components/schemas/Notification'
servers:
  - url: https://host.sdakft.hu/drhehw/api
  - url: https://host.sdakft.hu/mtfhw/api
  - url: https://host.sdakft.hu/tkbfhw/api
  - url: https://nappw.dfad.duf.hu/hallgato_ng/api
  - url: https://neptun-hweb.sze.hu/hallgato_ng/api
  - url: https://neptun-web1.tr.pte.hu/hallgatoing/api
  - url: https://neptun-ws01.uni-pannon.hu/hallgato/api
  - url: https://neptun.ejf.hu/hallgato_ng/api
  - url: https://neptun.gde.hu/hallgato/api
  - url: https://neptun.kodolanyi.hu/hallgato_NG/api
  - url: https://neptun.or-zse.hu/hallgato/api
  - url: https://neptun.szte.hu/hallgato/api
  - url: https://neptun.tf.hu/hallgato/api
  - url: https://neptun.uni-milton.hu/hallgato/api
  - url: https://neptun.univet.hu/ate_hw/api
  - url: https://neptun.vhf.hu/hallgato_ng/api
  - url: https://neptun2.ppke.hu/hallgato_uj/api
  - url: https://neptun3r.web.uni-corvinus.hu/Hallgatoi/api
  - url: https://neptunweb.uni-nke.hu/hallgato_ng/api
  - url: https://neptunweb1.metropolitan.hu/hallgato/api
  - url: https://neptunweb2.metropolitan.hu/hallgato/api
  - url: https://www-h-ng.neptun.unideb.hu/hallgato_ng/api
  - url: https://hallgato1.neptun.elte.hu/api
  - url: https://hallgato2.neptun.elte.hu/api
  - url: https://hallgato3.neptun.elte.hu/api
  - url: https://hallgato4.neptun.elte.hu/api
  - url: https://hallgato5.neptun.elte.hu/api
  - url: https://neptun.bme.hu/hallgatoi/api
paths:
  /Account/Authenticate:
    post:
      summary: Authenticate user
      operationId: authenticateUser
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                userName:
                  type: string
                password:
                  type: string
                captcha:
                  type: string
                captchaIdentifier:
                  type: string
                token:
                  type: string
                LCID:
                  type: integer
              required:
                - userName
                - password
                - captcha
                - captchaIdentifier
                - token
                - LCID
      responses:
        '200':
          description: Successful authentication
          content:
            application/json:
              schema:
                type: object
                properties:
                  data:
                    type: object
                    properties:
                      neptunCode:
                        type: string
                      accessToken:
                        type: string
                      numberOfDaysUntilADPasswordExpires:
                        type: integer
                      isCaptchaRequired:
                        type: boolean
                      isTwoFactorRequired:
                        type: boolean
                      refreshTokenExpiration:
                        type: string
                        format: date-time
                  notification:
                    $ref: '#/components/schemas/NotificationArray'
              example:
                data:
                  neptunCode: "ASDFGH"
                  accessToken: "eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9..7vd1GINk3wFyWuEzDMVVA00_HueEXRQFBqA75DtmSPc"
                  numberOfDaysUntilADPasswordExpires: -1
                  isCaptchaRequired: false
                  isTwoFactorRequired: false
                  refreshTokenExpiration: "2026-03-21T17:09:39.0188889Z"
                notification: []
        '401':
          description: Authentication response
          content:
            application/json:
              schema:
                type: string
                example: "Érvénytelen felhasználónév vagy jelszó."
  /General/GetHWebErrorReportingEmailSystemParameter:
    get:
      summary: Get error reporting email address
      operationId: getHWebErrorReportingEmailSystemParameter
      responses:
        '200':
          description: Returns the error reporting email address (nullable)
          content:
            application/json:
              schema:
                type: object
                properties:
                  data:
                    type: object
                    properties:
                      emailAddress:
                        type: [string, 'null']
                        nullable: true
                        description: The error reporting email address, or null if not set.
                  notification:
                    $ref: '#/components/schemas/NotificationArray'
  /General/EnvironmentData:
    get:
      summary: Get environment data
      operationId: getEnvironmentData
      responses:
        '200':
          description: Successful response
          content:
            application/json:
              schema:
                type: object
                properties:
                  data:
                    type: object
                    properties:
                      loginUrl:
                        type: [string, 'null']
                        nullable: true
                      logoutUrl:
                        type: [string, 'null']
                        nullable: true
                      version:
                        type: string
                        description: The version of the Neptun server.
                      generationDate:
                        type: string
                        format: date-time
                        description: Build time of the Neptun server.
                      instituteCode:
                        type: string
                      instituteNames:
                        type: array
                        items:
                          type: object
                          properties:
                            name:
                              type: string
                            lcid:
                              type: integer
                      testSystem:
                        type: boolean
                      logUIErrors:
                        type: boolean
                      isResetPasswordLinkVisible:
                        type: boolean
                      neptunDebugEnabled:
                        type: boolean
                      systemParameters:
                        type: object
                        properties:
                          isVirtualspaceFolderDescriptionRequired:
                            type: boolean
                          isSubstitutionReadonly:
                            type: boolean
                      serverName:
                        type: string
                      remainingSession:
                        type: integer
                        description: The Neptun server's remaining free user seats.
                      supportedLanguages:
                        type: array
                        items:
                          type: object
                          properties:
                            code:
                              type: string
                            name:
                              type: string
                            lcid:
                              type: integer
                            selected:
                              type: boolean
                  notification:
                    $ref: '#/components/schemas/NotificationArray'
  /General/Institute:
    get:
      summary: Get institution image
      operationId: getInstitutionImage
      responses:
        '200':
          description: Institution image. They promised to put this on a CDN. No CDN so far. ¯\\_(ツ)_/¯
          content:
            image/png:
              schema:
                type: string
                format: binary
            image/jpeg:
              schema:
                type: string
                format: binary
            image/svg+xml:
              schema:
                type: string
                format: binary

  /UserInfo:
    get:
      summary: Get user info
      description: Returns information about the authenticated user. Requires Authorization header with Bearer token.
      operationId: getUserInfo
      parameters:
        - in: header
          name: Authorization
          required: true
          schema:
            type: string
          example: "Bearer <JWT>"
          description: Bearer token for authentication.
      responses:
        '200':
          description: Successful response
          content:
            application/json:
              schema:
                type: object
                properties:
                  data:
                    type: object
                    properties:
                      userStatus:
                        type: integer
                      studentTrainingId:
                        type: string
                        format: uuid
                      userAvatar:
                        type: object
                        properties:
                          avatarType:
                            type: integer
                          image:
                            type: [string, 'null']
                            nullable: true
                          fallbackColorCodeInHexa:
                            type: string
                          printName:
                            type: string
                      name:
                        type: string
                      neptunCode:
                        type: string
                      substitutePrintName:
                        type: [string, 'null']
                        nullable: true
                      isTokenRegistered:
                        type: boolean
                  notification:
                    $ref: '#/components/schemas/NotificationArray'
              example:
                data:
                  userStatus: 32
                  studentTrainingId: "19fc1bb0-1c96-461a-a91c-4329d4fe75b4"
                  userAvatar:
                    avatarType: 1
                    image: null
                    fallbackColorCodeInHexa: "12CAA1"
                    printName: "Nagy Júia"
                  name: "Nagy Júia"
                  neptunCode: "ASDFGH"
                  substitutePrintName: null
                  isTokenRegistered: false
                notification: []
