paths:
  /Account/Authenticate:
    post:
      summary: Authenticate user
      operationId: authenticateUser
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                userName:
                  type: string
                password:
                  type: string
                captcha:
                  type: string
                captchaIdentifier:
                  type: string
                token:
                  type: string
                LCID:
                  type: integer
              required:
                - userName
                - password
                - captcha
                - captchaIdentifier
                - token
                - LCID
      responses:
        '200':
          description: Successful authentication
          content:
            application/json:
              schema:
                type: object
                properties:
                  data:
                    type: object
                    properties:
                      neptunCode:
                        type: string
                      accessToken:
                        type: string
                      numberOfDaysUntilADPasswordExpires:
                        type: integer
                      isCaptchaRequired:
                        type: boolean
                      isTwoFactorRequired:
                        type: boolean
                      refreshTokenExpiration:
                        type: string
                        format: date-time
                  notification:
                    type: array
                    items: {}
              example:
                data:
                  neptunCode: "ASDFGH"
                  accessToken: "eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9..7vd1GINk3wFyWuEzDMVVA00_HueEXRQFBqA75DtmSPc"
                  numberOfDaysUntilADPasswordExpires: -1
                  isCaptchaRequired: false
                  isTwoFactorRequired: false
                  refreshTokenExpiration: "2026-03-21T17:09:39.0188889Z"
                notification: []
        '401':
          description: Authentication response
          content:
            application/json:
              schema:
                type: string
                example: "Érvénytelen felhasználónév vagy jelszó."
  /General/GetHWebErrorReportingEmailSystemParameter:
    get:
      summary: Get error reporting email address
      operationId: getHWebErrorReportingEmailSystemParameter
      responses:
        '200':
          description: Returns the error reporting email address (nullable)
          content:
            application/json:
              schema:
                type: object
                properties:
                  data:
                    type: object
                    properties:
                      emailAddress:
                        type: [string, 'null']
                        nullable: true
                        description: The error reporting email address, or null if not set.
                  notification:
                    type: array
                    items: {}
  /General/EnvironmentData:
    get:
      summary: Get environment data
      operationId: getEnvironmentData
      responses:
        '200':
          description: Successful response
          content:
            application/json:
              schema:
                type: object
                properties:
                  data:
                    type: object
                    properties:
                      loginUrl:
                        type: [string, 'null']
                        nullable: true
                      logoutUrl:
                        type: [string, 'null']
                        nullable: true
                      version:
                        type: string
                        description: The version of the Neptun server.
                      generationDate:
                        type: string
                        format: date-time
                        description: Build time of the Neptun server.
                      instituteCode:
                        type: string
                      instituteNames:
                        type: array
                        items:
                          type: object
                          properties:
                            name:
                              type: string
                            lcid:
                              type: integer
                      testSystem:
                        type: boolean
                      logUIErrors:
                        type: boolean
                      isResetPasswordLinkVisible:
                        type: boolean
                      neptunDebugEnabled:
                        type: boolean
                      systemParameters:
                        type: object
                        properties:
                          isVirtualspaceFolderDescriptionRequired:
                            type: boolean
                          isSubstitutionReadonly:
                            type: boolean
                      serverName:
                        type: string
                      remainingSession:
                        type: integer
                        description: The Neptun server's remaining free user seats.
                      supportedLanguages:
                        type: array
                        items:
                          type: object
                          properties:
                            code:
                              type: string
                            name:
                              type: string
                            lcid:
                              type: integer
                            selected:
                              type: boolean
                  notification:
                    type: array
                    items: {}
  /General/Institute:
    get:
      summary: Get institution image
      operationId: getInstitutionImage
      responses:
        '200':
          description: Institution image. They promised to put this on a CDN. No CDN so far. ¯\\_(ツ)_/¯
          content:
            image/png:
              schema:
                type: string
                format: binary
            image/jpeg:
              schema:
                type: string
                format: binary
            image/svg+xml:
              schema:
                type: string
                format: binary
