  title: Neptun API
  version: 1.0.0
  description: OpenAPI spec for the new (Angular) version of Neptun. [Cors Everywhere](https://addons.mozilla.org/en-US/firefox/addon/cors-everywhere/) extension is recommended for testing the API.
